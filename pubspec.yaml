name: cipher
description: "Cipher — Smart QR Platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.6.2
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.3
  firebase_analytics: ^11.3.3
  firebase_crashlytics: ^4.1.3
  google_sign_in: ^6.2.1
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  mobile_scanner: ^5.2.3
  qr_flutter: ^4.1.0
  pdf: ^3.11.1
  printing: ^5.13.4
  excel: ^4.0.6
  share_plus: ^10.1.2
  image_picker: ^1.1.2
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  permission_handler: ^11.3.1
  flutter_secure_storage: ^9.2.2
  dio: ^5.7.0
  mailer: ^6.2.0
  uuid: ^4.5.1
  intl: ^0.19.0
  path_provider: ^2.1.5
  flutter_dotenv: ^5.2.1
  cached_network_image: ^3.4.1
  package_info_plus: ^8.1.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.3
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#080810"
  adaptive_icon_foreground: "assets/images/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
    - assets/fonts/
